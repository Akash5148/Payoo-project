<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo login</title>
    <!-- fav icon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- daisy and taiwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo max-w-[260px] mx-auto pt-[180px]">
        <img src="./assets/Logo-full.png">
        </div>

        <div class="login pt-10">

            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-sm mx-auto rounded-2xl ">
                <div class="card-body ">
                    <fieldset class="fieldset">
                        <label class="label font-medium text-[18px] text-black">Mobile Number</label>
                        <input id="input-number" maxlength="11" minlength="11" type="text" class="input rounded-[32px] bg-base-200" placeholder="Enter your 11 digit  number  "  />
                        <label class="label font-medium text-[16px] rounded-[32px] text-black">4 Digit Pin</label>
                        <input id="Pin-number" maxlength="4" minlength="4" type="text" class="input rounded-[32px] bg-base-200" placeholder="Enter 4 Digit Pin" value="1234" />
                        
                        <button id="login-btn" class="btn btn-primary mt-4 rounded-[32px]">Login</button>
                    </fieldset>
                </div>
            </div>
        </div>

      </div>

    <script src="login.js"></script>
</body>

</html>

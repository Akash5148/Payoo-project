<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Home</title>

    <!-- fav icon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- daisy and taiwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">



</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto container ">

    <header class="border-b-1 border-gray-300 pt-[15px] w-11/12 mx-auto sticky top-0  bg-base-200 z-10">
        <section class="flex  justify-between items-center">


            <div class="left  flex justify-between items-center gap-2">
                <div class="logo w-[60px] h-[60px]">
                    <img src="./assets/logo.png">
                </div>
                <div class="left-content">
                    <h1 class="font-bold">$ <span id="balanace">45000</span></h1>
                    <h1 class="opacity-40">Balance</h1>
                </div>

            </div>
            <div class="right">

                <a href="index.html" class="px-3 py-1 border-1  rounded-sm capitalize text-white btn btn-error">Logout
                    <i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </section>
    </header>

    <section>
        <div class="py-8 w-11/12 mx-auto space-y-4">

            <h1 class="text-[20px] font-bold">Welcome to Pay<span class="text-purple-500">oo</span></h1>
            <p class="text-[16px]  text-gray-400">Enjoy easy and convenient financial services with us. Cashout charge
                is low and </p>
        </div>



        <div class="">
            <div class="buttons grid grid-cols-3 gap-4 mx-auto p-5">



                <button onclick="showonly('add-money') "
                    class="flex flex-col justify-center items-center btn btn-soft btn-primary py-3 rounded-lg h-full ">
                    <img src="./assets/opt-1.png">
                    <p>Add Money</p>
                </button>


                <button onclick="showonly('Cashout') "
                    class="btn btn-soft btn-primary flex flex-col justify-center items-center  py-3 rounded-lg h-full ">
                    <img src="./assets/opt-2.png">
                    <p>Cashout</p>
                </button>
                <button onclick="showonly('Transfer-money')"
                    class=" btn btn-soft btn-primary flex flex-col justify-center items-center  py-3 rounded-lg h-full ">
                    <img src="./assets/opt-3.png">
                    <p>Transfer Money</p>
                </button>
                <button onclick="showonly('bonas')"
                    class=" btn btn-soft btn-primary flex flex-col justify-center items-center  py-3 rounded-lg h-full ">
                    <img src="./assets/opt-4.png">
                    <p>Get Bonus</p>
                </button>
                <button onclick="showonly('pay-money')"
                    class="btn btn-soft btn-primary flex flex-col justify-center items-center  py-3 rounded-lg h-full ">
                    <img src="./assets/opt-5.png">
                    <p>Pay Bill</p>
                </button>
                <button onclick="showonly('history')"
                    class="btn btn-soft btn-primary flex flex-col justify-center items-center  py-3 rounded-lg h-full ">
                    <img src="./assets/opt-6.png">
                    <p>Transactions</p>
                </button>



            </div>


        </div>
    </section>
    <!-- bonas part -->
      <section id="bonas" class="w-11/12 mx-auto hidden  ">
        <h2 class="font-bold text-[22px] py-5">Get Bonus</h2>



        <div class="card bg-base-100 w-full  rounded-2xl ">
            <div class="card-body ">
                <fieldset class="fieldset">
                   


                    <label class="label font-medium text-[18px] text-black ">Enter Bonus Coupon</label>
                    <input id="Copon"  type="text"
                        class="input rounded-[32px] bg-base-200 w-full"
                        placeholder="Enter your Copon  " />

                    <p class="center text-red-600"> To get Bonas use "payoo" promo Card.</p>
                    <button id="bonas-btn" class="btn btn-primary mt-4 text-[18px] rounded-[32px] w-full">Get Bonus</button>
                </fieldset>
            </div>
        </div>

    </section>


    <section  id="history" class="w-11/12 mx-auto hidden">
        <h2 class="font-bold text-[22px] py-5">Transaction History</h2>
        <div id="history-container" class=" bg-base-100 space-y-5">


        </div>


    </section>
    <section id="add-money" class="w-11/12 mx-auto hidden ">
        <h2 class="font-bold text-[22px] py-5">Add Money</h2>



        <div class="card bg-base-100 w-full  rounded-2xl ">
            <div class="card-body ">
                <fieldset class="fieldset">
                    <label class="label font-medium text-[18px] text-black ">Select A Bank</label>
                    <select id="add-money-bank" class="select w-full rounded-full bg-base-200">
                        <option disabled selected>Select A Bank</option>
                        <option>DBBL</option>
                        <option>IFIC</option>
                        <option>ISLAMI Bank</option>
                    </select>


                    <label class="label font-medium text-[18px] text-black ">Bank Account Number</label>
                    <input id="Bank Account-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-[32px] bg-base-200 w-full"
                        placeholder="Enter your 11 digit Bank Account number  " />

                    <label class="label font-medium text-[18px] text-black">Amount to Add</label>
                    <input id="Amount-to add" type="number" class="input rounded-[32px] bg-base-200 w-full"
                        placeholder="Enter amount to add  " />
                    <label class="label font-medium text-[16px] rounded-[32px] text-black">Pin Number</label>
                    <input id="add-Pin-number" maxlength="4" minlength="4" type="text"
                        class="input rounded-[32px] bg-base-200 w-full" placeholder="Enter 4 Digit Pin" value="1234" />

                    <button id="add-btn" class="btn btn-primary mt-4 text-[18px] rounded-[32px] w-full">Add Money</button>
                </fieldset>
            </div>
        </div>

    </section>

    <!-- pay part -->

    <section id="pay-money" class="w-11/12 mx-auto hidden  ">
        <h2 class="font-bold text-[22px] py-5">Pay Bill</h2>



        <div class="card bg-base-100 w-full  rounded-2xl ">
            <div class="card-body ">
                <fieldset class="fieldset">
                    <label class="label font-medium text-[18px] text-black ">Select To Pay</label>
                    <select id="pay-money-bill" class="select w-full rounded-full bg-base-200">
                        <option disabled selected>Select To Pay</option>
                        <option>Internet Bill</option>
                        <option>Electricity Bill</option>
                        <option>water Bill</option>

                        <option>Gas Bill</option>

                    </select>


                    <label class="label font-medium text-[18px] text-black ">Biller Account Number</label>
                    <input id="Biller-Account-number" type="text" class="input rounded-[32px] bg-base-200 w-full"
                        placeholder="Enter Biller Account number  " />

                    <label class="label font-medium text-[18px] text-black">Amount to pay</label>
                    <input id="Amount-to pay" type="number" class="input rounded-[32px] bg-base-200 w-full"
                        placeholder="Enter amount to pay  " />
                    <label class="label font-medium text-[16px] rounded-[32px] text-black">Pin Number</label>
                    <input id="pay-Pin-number" maxlength="4" minlength="4" type="text"
                        class="input rounded-[32px] bg-base-200 w-full" placeholder="Enter 4 Digit Pin" value="1234" />

                    <button id="pay-btn" class="btn btn-primary text-[18px] mt-4 rounded-[32px] w-full">Pay Now</button>
                </fieldset>
            </div>
        </div>

    </section>

    <!-- money tranfer section -->
    <section id="Transfer-money" class="w-11/12 mx-auto hidden ">
        <h2 class="font-bold text-[22px] py-5">Transfer Money</h2>



        <div class="card bg-base-100 w-full  rounded-2xl ">
            <div class="card-body ">
                <fieldset class="fieldset">



                    <label class="label font-medium text-[18px] text-black ">User Account Number</label>
                    <input id="user-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-[32px] bg-base-200 w-full" placeholder="Enter User 11 digit number  " />

                    <label class="label font-medium text-[18px] text-black">Amount</label>
                    <input id="Amount-to send" type="number" class="input rounded-[32px] bg-base-200 w-full"
                        placeholder="Enter Amount to Transfer  " />
                    <label class="label font-medium text-[16px] rounded-[32px] text-black">Pin Number</label>
                    <input id="send-Pin-number" maxlength="4" minlength="4" type="text"
                        class="input rounded-[32px] bg-base-200 w-full" placeholder="Enter 4 Digit Pin" value="1234" />

                    <button id="transfer-btn" class="btn btn-primary text-[18px] mt-4 rounded-[32px] w-full">Send Now</button>
                </fieldset>
            </div>
        </div>

    </section>
    <!-- //Cashout part -->
    <section id="Cashout" class="w-11/12 mx-auto  hidden  ">
        <h2 class="font-bold text-[22px] py-5">Cash Out</h2>
        <div class="card bg-base-100 w-full  rounded-2xl ">
            <div class="card-body ">
                <fieldset class="fieldset">
                    <label class="label font-medium text-[18px] text-black ">Agent Number</label>
                    <input id="Agent-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-[32px] bg-base-200 w-full" placeholder="Enter your agent number  " />

                    <label class="label font-medium text-[18px] text-black">Amount</label>
                    <input id="Amount-number" maxlength="11" minlength="11" type="number"
                        class="input rounded-[32px] bg-base-200 w-full" placeholder="Enter amount to withdraw  " />
                    <label class="label font-medium text-[16px] rounded-[32px] text-black">Pin Number</label>
                    <input id="Pin-number" maxlength="4" minlength="4" type="text"
                        class="input rounded-[32px] bg-base-200 w-full" placeholder="Enter 4 Digit Pin" value="1234" />

                    <button id="CashOut-btn" class="btn btn-primary  mt-4 rounded-[32px] w-full">Withdraw Money</button>
                </fieldset>
            </div>
        </div>


    </section>
    <script src="script.js"></script>
</body>

</html>
